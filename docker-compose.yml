# ===========================================
# DSP Platform - Docker Compose
# ===========================================
# Usage:
#   docker compose up -d                        # Start Master only (default)
#   docker compose --profile agent up -d        # Start Agent only (connect to external Master)
#   docker compose --profile all up -d          # Start Master + Agent
#   docker compose logs -f                      # View logs
#   docker compose down                         # Stop all

services:
  # ===========================================
  # Master Server
  # ===========================================
  master:
    build:
      context: .
      dockerfile: Dockerfile
      target: master
    image: dsp-platform/master:latest
    container_name: dsp-master
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-441}:441" # Web Console
      - "${TCP_PORT:-447}:447" # Agent TCP
    volumes:
      - dsp-master-data:/app/data
      - dsp-master-logs:/app/logs
      - ./certs:/app/certs
    environment:
      - HTTP_PORT=441
      - TCP_PORT=447
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - TLS_ENABLED=${TLS_ENABLED:-true}
      - TLS_CERT_PATH=/app/certs/server.crt
      - TLS_KEY_PATH=/app/certs/server.key
      - PAYLOAD_ENCRYPTION=${PAYLOAD_ENCRYPTION:-false}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:441/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dsp-network
    profiles:
      - master
      - all
      - "" # Default profile (no profile specified)

  # ===========================================
  # Agent - Connect to local Master (same compose)
  # ===========================================
  agent-local:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: dsp-platform/agent:latest
    container_name: dsp-agent-local
    restart: unless-stopped
    depends_on:
      master:
        condition: service_healthy
    volumes:
      - dsp-agent-data:/app/data
      - dsp-agent-logs:/app/logs
      - ./certs:/app/certs:ro
    environment:
      - MASTER_HOST=master # Connect to Master container
      - MASTER_PORT=447
      - AGENT_NAME=${AGENT_NAME:-docker-agent}
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - TLS_ENABLED=${TLS_ENABLED:-false}
      - TLS_SKIP_VERIFY=${TLS_SKIP_VERIFY:-true}
      - PAYLOAD_ENCRYPTION=${PAYLOAD_ENCRYPTION:-false}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    networks:
      - dsp-network
    profiles:
      - all # Only with: docker compose --profile all up

  # ===========================================
  # Agent - Connect to external Master (remote)
  # ===========================================
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: dsp-platform/agent:latest
    container_name: dsp-agent
    restart: unless-stopped
    volumes:
      - dsp-agent-data:/app/data
      - dsp-agent-logs:/app/logs
      - ./certs:/app/certs:ro
    environment:
      - MASTER_HOST=${MASTER_HOST:-localhost} # External Master IP
      - MASTER_PORT=${MASTER_PORT:-447}
      - AGENT_NAME=${AGENT_NAME:-docker-agent}
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - TLS_ENABLED=${TLS_ENABLED:-false}
      - TLS_SKIP_VERIFY=${TLS_SKIP_VERIFY:-true}
      - PAYLOAD_ENCRYPTION=${PAYLOAD_ENCRYPTION:-false}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    network_mode: host # Use host network to connect to external Master
    profiles:
      - agent # Only with: docker compose --profile agent up

# ===========================================
# Volumes
# ===========================================
volumes:
  dsp-master-data:
    name: dsp-master-data
  dsp-master-logs:
    name: dsp-master-logs
  dsp-agent-data:
    name: dsp-agent-data
  dsp-agent-logs:
    name: dsp-agent-logs

# ===========================================
# Networks
# ===========================================
networks:
  dsp-network:
    name: dsp-network
    driver: bridge
